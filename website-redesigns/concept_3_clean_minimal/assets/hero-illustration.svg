<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="400" height="550">
  <defs>
    <!-- Subtle ambient glow behind phone -->
    <radialGradient id="glow-blue" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#0066CC" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#0066CC" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0066CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="35%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </radialGradient>
    <!-- Phone screen clip -->
    <clipPath id="screen-clip">
      <rect x="78" y="40" width="244" height="470" rx="8"/>
    </clipPath>
    <!-- Phone shadow -->
    <filter id="phone-shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background glows -->
  <rect width="400" height="550" fill="transparent"/>
  <ellipse cx="200" cy="240" rx="180" ry="200" fill="url(#glow-blue)"/>
  <ellipse cx="140" cy="300" rx="120" ry="130" fill="url(#glow-green)"/>

  <!-- Phone body -->
  <g filter="url(#phone-shadow)">
    <rect x="68" y="25" width="264" height="500" rx="36" fill="#1D1D1F"/>
    <!-- Screen bezel inset -->
    <rect x="74" y="35" width="252" height="480" rx="28" fill="#0D1117"/>
  </g>

  <!-- Status bar -->
  <g clip-path="url(#screen-clip)">
    <!-- Screen background -->
    <rect x="78" y="40" width="244" height="470" fill="#0D1117"/>

    <!-- Dynamic Island -->
    <rect x="160" y="46" width="80" height="24" rx="12" fill="#000000"/>

    <!-- Status bar text -->
    <text x="96" y="62" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="#E6EDF3">9:41</text>
    <text x="290" y="62" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="#E6EDF3" text-anchor="end">100%</text>
    <!-- Battery icon -->
    <rect x="292" y="55" width="18" height="9" rx="2" fill="none" stroke="#E6EDF3" stroke-width="0.8"/>
    <rect x="310" y="57.5" width="2" height="4" rx="0.5" fill="#E6EDF3"/>
    <rect x="294" y="57" width="14" height="5" rx="1" fill="#34C759"/>

    <!-- App header -->
    <text x="96" y="96" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#E6EDF3">Dashboard</text>
    <text x="290" y="96" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#34C759" text-anchor="end" font-weight="500">Connected</text>
    <circle cx="268" cy="93" r="3" fill="#34C759"/>

    <!-- Vehicle info card -->
    <rect x="88" y="110" width="224" height="52" rx="12" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <text x="100" y="130" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#8B949E" font-weight="500" letter-spacing="0.5">VEHICLE</text>
    <text x="100" y="148" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#E6EDF3" font-weight="500">2024 Honda Civic Sport</text>
    <text x="300" y="148" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#00D4FF" text-anchor="end" font-weight="500">KWP2000</text>

    <!-- Live data grid: 2x2 -->
    <text x="88" y="186" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#8B949E" font-weight="500" letter-spacing="0.8">LIVE DATA</text>

    <!-- RPM card -->
    <rect x="88" y="196" width="108" height="72" rx="12" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <text x="100" y="216" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#6E7681" font-weight="500">RPM</text>
    <text x="100" y="244" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#00D4FF" font-weight="300">847</text>
    <text x="100" y="258" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#34C759">Idle</text>

    <!-- Coolant card -->
    <rect x="204" y="196" width="108" height="72" rx="12" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <text x="216" y="216" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#6E7681" font-weight="500">COOLANT</text>
    <text x="216" y="244" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#E6EDF3" font-weight="300">92</text>
    <text x="258" y="244" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6E7681" font-weight="300">&#x00B0;C</text>
    <text x="216" y="258" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#34C759">Normal</text>

    <!-- Voltage card -->
    <rect x="88" y="276" width="108" height="72" rx="12" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <text x="100" y="296" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#6E7681" font-weight="500">VOLTAGE</text>
    <text x="100" y="324" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#E6EDF3" font-weight="300">14.2</text>
    <text x="155" y="324" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6E7681" font-weight="300">V</text>
    <text x="100" y="338" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#34C759">Charging</text>

    <!-- Speed card -->
    <rect x="204" y="276" width="108" height="72" rx="12" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <text x="216" y="296" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#6E7681" font-weight="500">SPEED</text>
    <text x="216" y="324" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#E6EDF3" font-weight="300">0</text>
    <text x="233" y="324" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6E7681" font-weight="300">km/h</text>
    <text x="216" y="338" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#8B949E">Stationary</text>

    <!-- DTCs section -->
    <text x="88" y="374" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#8B949E" font-weight="500" letter-spacing="0.8">DIAGNOSTICS</text>

    <rect x="88" y="384" width="224" height="40" rx="10" fill="#151B23" stroke="#2A3A4E" stroke-width="0.5"/>
    <circle cx="104" cy="404" r="4" fill="#34C759"/>
    <text x="114" y="408" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#E6EDF3" font-weight="500">No trouble codes</text>
    <text x="300" y="408" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#8B949E" text-anchor="end">Clear</text>

    <!-- AI insight card -->
    <rect x="88" y="432" width="224" height="56" rx="10" fill="#151B23" stroke="#0066CC" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="100" y="451" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#0066CC" font-weight="600" letter-spacing="0.5">AI INSIGHT</text>
    <text x="100" y="466" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#8B949E">All systems nominal. Coolant temp</text>
    <text x="100" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#8B949E">within expected range for idle.</text>

    <!-- Bottom nav bar -->
    <rect x="78" y="494" width="244" height="16" fill="#0D1117"/>
    <rect x="155" y="500" width="90" height="4" rx="2" fill="#6E7681"/>
  </g>
</svg>
