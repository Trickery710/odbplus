<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- icon-connect: wifi arcs -->
  <symbol id="icon-connect" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/>
    <path d="M8.5 15.5a5 5 0 0 1 7 0"/>
    <path d="M5 12a9 9 0 0 1 14 0"/>
    <path d="M1.5 8.5a13 13 0 0 1 21 0"/>
  </symbol>

  <!-- icon-live: waveform with 3 peaks -->
  <symbol id="icon-live" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12h3l2-6 3 12 3-9 2 6 2-3h5"/>
  </symbol>

  <!-- icon-codes: document with lines -->
  <symbol id="icon-codes" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 2h8l6 6v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
    <path d="M14 2v6h6"/>
    <line x1="8" y1="13" x2="16" y2="13"/>
    <line x1="8" y1="17" x2="13" y2="17"/>
  </symbol>

  <!-- icon-ai: minimal sparkle/star -->
  <symbol id="icon-ai" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8L12 2z"/>
    <path d="M18 14l.9 2.6L21.5 17.5l-2.6.9L18 21l-.9-2.6-2.6-.9 2.6-.9L18 14z"/>
  </symbol>

  <!-- icon-logs: rewind/replay -->
  <symbol id="icon-logs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 1 1.7 5.3"/>
    <polyline points="3 17 3 12 8 12"/>
    <polyline points="12 7 12 12 15.5 14"/>
  </symbol>

  <!-- icon-terminal: cursor prompt -->
  <symbol id="icon-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="4" width="20" height="16" rx="2"/>
    <polyline points="7 9 10 12 7 15"/>
    <line x1="13" y1="15" x2="17" y2="15"/>
  </symbol>

  <!-- icon-tests: checkmark in circle -->
  <symbol id="icon-tests" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="8 12 11 15 16 9"/>
  </symbol>

  <!-- icon-parts: minimal wrench -->
  <symbol id="icon-parts" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94L6.73 20.15a2.13 2.13 0 0 1-3-3l6.79-6.79a6 6 0 0 1 7.94-7.94l-3.76 3.88z"/>
  </symbol>

  <!-- icon-forums: speech bubble -->
  <symbol id="icon-forums" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </symbol>

  <!-- icon-sensors: dot with radiating arcs -->
  <symbol id="icon-sensors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
    <path d="M7.8 7.8a6 6 0 0 0 0 8.4"/>
    <path d="M16.2 7.8a6 6 0 0 1 0 8.4"/>
    <path d="M4.9 4.9a10 10 0 0 0 0 14.2"/>
    <path d="M19.1 4.9a10 10 0 0 1 0 14.2"/>
  </symbol>

  <!-- icon-download: arrow down into tray -->
  <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v12"/>
    <polyline points="8 11 12 15 16 11"/>
    <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
  </symbol>

  <!-- icon-arrow-right: simple chevron -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"/>
    <polyline points="13 6 19 12 13 18"/>
  </symbol>

  <!-- icon-plug: OBD plug -->
  <symbol id="icon-plug" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 2v4"/>
    <path d="M17 2v4"/>
    <rect x="4" y="6" width="16" height="8" rx="2"/>
    <path d="M9 14v4a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-4"/>
  </symbol>

  <!-- icon-phone: smartphone -->
  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="2" width="14" height="20" rx="3"/>
    <line x1="12" y1="18" x2="12" y2="18.01"/>
  </symbol>

  <!-- icon-check: simple check -->
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="4 12 9 17 20 6"/>
  </symbol>

  <!-- icon-menu: hamburger -->
  <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </symbol>

  <!-- icon-close: X -->
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>

</svg>
