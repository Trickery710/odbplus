  <!-- Dot grid at 4% opacity green -->
  <circle cx="2" cy="2" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="6" cy="2" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="10" cy="2" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="14" cy="2" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="18" cy="2" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="2" cy="6" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="6" cy="6" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="10" cy="6" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="14" cy="6" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="18" cy="6" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="2" cy="10" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="6" cy="10" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="10" cy="10" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="14" cy="10" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="18" cy="10" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="2" cy="14" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="6" cy="14" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="10" cy="14" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="14" cy="14" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="18" cy="14" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="2" cy="18" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="6" cy="18" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="10" cy="18" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="14" cy="18" r="0.5" fill="#00FF88" opacity="0.04"/>
  <circle cx="18" cy="18" r="0.5" fill="#00FF88" opacity="0.04"/>
