<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- Bluetooth/WiFi Connect -->
  <symbol id="icon-connect" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.5 6.5l11 11L12 23V1l5.5 5.5-11 11"/>
    <path d="M2 8.5a7 7 0 0 1 0 7" opacity="0.5"/>
    <path d="M22 8.5a7 7 0 0 0 0 7" opacity="0.5"/>
  </symbol>

  <!-- Live Waveform/Heartbeat -->
  <symbol id="icon-live" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1,12 5,12 7,4 10,20 13,8 16,16 18,12 23,12"/>
    <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none" opacity="0.4"/>
  </symbol>

  <!-- Document with Magnifier (Error Codes) -->
  <symbol id="icon-codes" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14,2 14,8 20,8"/>
    <circle cx="14" cy="15" r="3"/>
    <line x1="16.5" y1="17.5" x2="19" y2="20"/>
    <line x1="8" y1="13" x2="10" y2="13"/>
    <line x1="8" y1="17" x2="10" y2="17"/>
  </symbol>

  <!-- AI Sparkle -->
  <symbol id="icon-ai" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/>
    <path d="M18 2l.8 2.4L21 5.2l-2.2.8L18 8.4l-.8-2.4L15 5.2l2.2-.8z" opacity="0.5"/>
    <circle cx="12" cy="12" r="2" fill="currentColor" opacity="0.15" stroke="none"/>
  </symbol>

  <!-- Play + Waveform (Session Logger) -->
  <symbol id="icon-logs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="6,3 20,12 6,21"/>
    <line x1="1" y1="8" x2="1" y2="16" opacity="0.5"/>
    <line x1="23" y1="6" x2="23" y2="18" opacity="0.5"/>
    <line x1="3" y1="10" x2="3" y2="14" opacity="0.3"/>
  </symbol>

  <!-- Terminal Prompt -->
  <symbol id="icon-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="18" rx="3"/>
    <polyline points="6,10 10,13 6,16"/>
    <line x1="13" y1="16" x2="18" y2="16"/>
    <circle cx="6" cy="6.5" r="0.75" fill="currentColor" stroke="none" opacity="0.4"/>
    <circle cx="9" cy="6.5" r="0.75" fill="currentColor" stroke="none" opacity="0.4"/>
    <circle cx="12" cy="6.5" r="0.75" fill="currentColor" stroke="none" opacity="0.4"/>
  </symbol>

  <!-- Checkmark Gauge (Guided Tests) -->
  <symbol id="icon-tests" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="13" r="9"/>
    <path d="M12 4v2"/>
    <path d="M5 13H3"/>
    <path d="M21 13h-2"/>
    <path d="M12 13l4-5" stroke-width="2"/>
    <polyline points="8.5,13.5 10.5,15.5 15.5,10.5" stroke-width="1.5"/>
  </symbol>

  <!-- Wrench/Gear (Parts) -->
  <symbol id="icon-parts" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
  </symbol>

  <!-- Speech Bubbles (Forums) -->
  <symbol id="icon-forums" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <path d="M8 9h8" opacity="0.5"/>
    <path d="M8 13h5" opacity="0.5"/>
  </symbol>

  <!-- Circuit Node (Sensors) -->
  <symbol id="icon-sensors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
    <line x1="12" y1="2" x2="12" y2="9"/>
    <line x1="12" y1="15" x2="12" y2="22"/>
    <line x1="2" y1="12" x2="9" y2="12"/>
    <line x1="15" y1="12" x2="22" y2="12"/>
    <circle cx="12" cy="2" r="1.5" fill="currentColor" opacity="0.3"/>
    <circle cx="12" cy="22" r="1.5" fill="currentColor" opacity="0.3"/>
    <circle cx="2" cy="12" r="1.5" fill="currentColor" opacity="0.3"/>
    <circle cx="22" cy="12" r="1.5" fill="currentColor" opacity="0.3"/>
  </symbol>

</svg>