<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="hero-blue-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="hero-screen-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#151B23"/>
    </linearGradient>
    <linearGradient id="gauge-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="screen-clip">
      <rect x="108" y="52" width="184" height="396" rx="6"/>
    </clipPath>
  </defs>

  <!-- Phone Frame -->
  <g filter="url(#soft-shadow)">
    <!-- Phone body -->
    <rect x="100" y="30" width="200" height="440" rx="24" fill="#1A1A2E"/>
    <rect x="102" y="32" width="196" height="436" rx="22" fill="#0F0F1A" stroke="#2A2A3E" stroke-width="1"/>

    <!-- Screen area -->
    <rect x="108" y="52" width="184" height="396" rx="6" fill="url(#hero-screen-bg)"/>

    <!-- Content clipped to screen -->
    <g clip-path="url(#screen-clip)">

      <!-- Status bar -->
      <rect x="108" y="52" width="184" height="24" fill="#0D1117"/>
      <text x="130" y="67" font-family="Inter, sans-serif" font-size="8" fill="#8B949E">9:41</text>
      <!-- Signal bars -->
      <rect x="254" y="59" width="3" height="4" rx="0.5" fill="#8B949E"/>
      <rect x="259" y="57" width="3" height="6" rx="0.5" fill="#8B949E"/>
      <rect x="264" y="55" width="3" height="8" rx="0.5" fill="#8B949E"/>
      <rect x="269" y="53" width="3" height="10" rx="0.5" fill="#8B949E"/>
      <!-- Battery -->
      <rect x="276" y="57" width="12" height="7" rx="1.5" fill="none" stroke="#8B949E" stroke-width="1"/>
      <rect x="278" y="59" width="7" height="3" rx="0.5" fill="#10B981"/>
      <rect x="288" y="59" width="1.5" height="3" rx="0.5" fill="#8B949E"/>

      <!-- Connected status badge -->
      <rect x="142" y="84" width="116" height="26" rx="13" fill="#10B981" opacity="0.15"/>
      <circle cx="158" cy="97" r="4" fill="#10B981"/>
      <text x="168" y="101" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#10B981">Connected</text>

      <!-- Vehicle name -->
      <text x="200" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#E6EDF3">2024 Honda Civic</text>
      <text x="200" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#6E7681">VIN: 2HGFC...8H549</text>

      <!-- RPM Gauge (large, center) -->
      <g transform="translate(200, 210)" filter="url(#glow)">
        <!-- Gauge background arc -->
        <circle cx="0" cy="0" r="52" fill="none" stroke="#1A2332" stroke-width="6"/>
        <!-- Gauge value arc (approx 70%) -->
        <circle cx="0" cy="0" r="52" fill="none" stroke="url(#gauge-cyan)" stroke-width="6"
                stroke-dasharray="228 327" stroke-dashoffset="82" stroke-linecap="round"
                transform="rotate(-90)"/>
        <!-- Center value -->
        <text x="0" y="-6" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#00D4FF">2,847</text>
        <text x="0" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#6E7681">RPM</text>
      </g>

      <!-- Speed mini gauge (left) -->
      <g transform="translate(140, 300)">
        <circle cx="0" cy="0" r="28" fill="none" stroke="#1A2332" stroke-width="4"/>
        <circle cx="0" cy="0" r="28" fill="none" stroke="#00D4FF" stroke-width="4"
                stroke-dasharray="105 176" stroke-dashoffset="44" stroke-linecap="round"
                transform="rotate(-90)" opacity="0.8"/>
        <text x="0" y="-2" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#E6EDF3">62</text>
        <text x="0" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#6E7681">MPH</text>
      </g>

      <!-- Temp mini gauge (right) -->
      <g transform="translate(260, 300)">
        <circle cx="0" cy="0" r="28" fill="none" stroke="#1A2332" stroke-width="4"/>
        <circle cx="0" cy="0" r="28" fill="none" stroke="#10B981" stroke-width="4"
                stroke-dasharray="88 176" stroke-dashoffset="44" stroke-linecap="round"
                transform="rotate(-90)" opacity="0.8"/>
        <text x="0" y="-2" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#E6EDF3">192</text>
        <text x="0" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#6E7681">&deg;F</text>
      </g>

      <!-- PID data rows -->
      <g transform="translate(118, 350)">
        <rect x="0" y="0" width="164" height="28" rx="6" fill="#1A2332"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" fill="#8B949E">Fuel Trim (ST)</text>
        <text x="144" y="18" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#10B981">+2.3%</text>
      </g>
      <g transform="translate(118, 384)">
        <rect x="0" y="0" width="164" height="28" rx="6" fill="#1A2332"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" fill="#8B949E">MAF Rate</text>
        <text x="144" y="18" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#00D4FF">14.2 g/s</text>
      </g>
      <g transform="translate(118, 418)">
        <rect x="0" y="0" width="164" height="28" rx="6" fill="#1A2332"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" fill="#8B949E">Throttle</text>
        <text x="144" y="18" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#E6EDF3">18.4%</text>
      </g>

    </g>

    <!-- Notch / Dynamic Island -->
    <rect x="170" y="36" width="60" height="16" rx="8" fill="#0F0F1A"/>

    <!-- Home indicator -->
    <rect x="170" y="456" width="60" height="4" rx="2" fill="#2A2A3E"/>
  </g>

  <!-- Decorative floating elements -->
  <circle cx="56" cy="120" r="6" fill="#2563EB" opacity="0.15"/>
  <circle cx="340" cy="90" r="8" fill="#10B981" opacity="0.12"/>
  <circle cx="48" cy="380" r="10" fill="#2563EB" opacity="0.08"/>
  <circle cx="356" cy="350" r="5" fill="#10B981" opacity="0.15"/>
  <circle cx="70" cy="250" r="4" fill="#2563EB" opacity="0.1"/>
  <circle cx="330" cy="220" r="6" fill="#10B981" opacity="0.1"/>
</svg>