<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="circuitPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#0D1117"/>

      <!-- Horizontal traces -->
      <line x1="0" y1="40" x2="60" y2="40" stroke="#00D4FF" stroke-width="0.5" opacity="0.08"/>
      <line x1="80" y1="40" x2="140" y2="40" stroke="#00D4FF" stroke-width="0.5" opacity="0.06"/>
      <line x1="0" y1="100" x2="40" y2="100" stroke="#00D4FF" stroke-width="0.5" opacity="0.07"/>
      <line x1="60" y1="100" x2="120" y2="100" stroke="#00D4FF" stroke-width="0.5" opacity="0.05"/>
      <line x1="140" y1="100" x2="200" y2="100" stroke="#00D4FF" stroke-width="0.5" opacity="0.08"/>
      <line x1="30" y1="160" x2="100" y2="160" stroke="#00D4FF" stroke-width="0.5" opacity="0.06"/>
      <line x1="120" y1="160" x2="180" y2="160" stroke="#00D4FF" stroke-width="0.5" opacity="0.07"/>

      <!-- Vertical traces -->
      <line x1="40" y1="0" x2="40" y2="40" stroke="#00D4FF" stroke-width="0.5" opacity="0.06"/>
      <line x1="100" y1="40" x2="100" y2="100" stroke="#00D4FF" stroke-width="0.5" opacity="0.07"/>
      <line x1="160" y1="0" x2="160" y2="60" stroke="#00D4FF" stroke-width="0.5" opacity="0.05"/>
      <line x1="60" y1="100" x2="60" y2="160" stroke="#00D4FF" stroke-width="0.5" opacity="0.06"/>
      <line x1="140" y1="100" x2="140" y2="160" stroke="#00D4FF" stroke-width="0.5" opacity="0.08"/>
      <line x1="40" y1="160" x2="40" y2="200" stroke="#00D4FF" stroke-width="0.5" opacity="0.05"/>
      <line x1="180" y1="160" x2="180" y2="200" stroke="#00D4FF" stroke-width="0.5" opacity="0.07"/>

      <!-- Diagonal traces -->
      <line x1="60" y1="40" x2="80" y2="60" stroke="#00D4FF" stroke-width="0.4" opacity="0.05"/>
      <line x1="120" y1="100" x2="140" y2="80" stroke="#00D4FF" stroke-width="0.4" opacity="0.04"/>
      <line x1="100" y1="160" x2="120" y2="140" stroke="#00D4FF" stroke-width="0.4" opacity="0.05"/>

      <!-- Junction nodes (small dots where traces meet) -->
      <circle cx="40" cy="40" r="2" fill="#00D4FF" opacity="0.12"/>
      <circle cx="60" cy="40" r="1.5" fill="#00D4FF" opacity="0.1"/>
      <circle cx="100" cy="40" r="1" fill="#00D4FF" opacity="0.08"/>
      <circle cx="140" cy="40" r="1.5" fill="#00D4FF" opacity="0.1"/>
      <circle cx="40" cy="100" r="1.5" fill="#00D4FF" opacity="0.1"/>
      <circle cx="60" cy="100" r="2" fill="#00D4FF" opacity="0.12"/>
      <circle cx="120" cy="100" r="1" fill="#00D4FF" opacity="0.08"/>
      <circle cx="140" cy="100" r="2" fill="#00D4FF" opacity="0.12"/>
      <circle cx="100" cy="160" r="1.5" fill="#00D4FF" opacity="0.1"/>
      <circle cx="120" cy="160" r="1" fill="#00D4FF" opacity="0.08"/>
      <circle cx="180" cy="160" r="1.5" fill="#00D4FF" opacity="0.1"/>
      <circle cx="40" cy="160" r="1" fill="#00D4FF" opacity="0.08"/>
      <circle cx="160" cy="60" r="1" fill="#00D4FF" opacity="0.08"/>

      <!-- Larger junction pads -->
      <rect x="58" y="98" width="4" height="4" rx="0.5" fill="#00D4FF" opacity="0.06"/>
      <rect x="138" y="98" width="4" height="4" rx="0.5" fill="#00D4FF" opacity="0.06"/>
      <rect x="38" y="38" width="4" height="4" rx="0.5" fill="#00D4FF" opacity="0.05"/>

      <!-- Via holes -->
      <circle cx="80" cy="60" r="3" fill="none" stroke="#00D4FF" stroke-width="0.4" opacity="0.06"/>
      <circle cx="80" cy="60" r="1" fill="#00D4FF" opacity="0.04"/>
      <circle cx="140" cy="80" r="3" fill="none" stroke="#00D4FF" stroke-width="0.4" opacity="0.06"/>
      <circle cx="140" cy="80" r="1" fill="#00D4FF" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#circuitPattern)"/>
</svg>