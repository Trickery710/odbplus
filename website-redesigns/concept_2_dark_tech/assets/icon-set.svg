<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="0" height="0" style="display:none">
  <defs>
    <filter id="iconGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- icon-connect: Hexagonal signal / Bluetooth -->
  <symbol id="icon-connect" viewBox="0 0 48 48">
    <!-- Hexagon outline -->
    <polygon points="24,4 42,14 42,34 24,44 6,34 6,14"
             fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Bluetooth paths inside -->
    <path d="M 20 16 L 28 24 L 20 32 M 28 24 L 20 16 L 28 8 L 28 40 L 20 32"
          fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(0, 8) scale(0.7) translate(8, 0)"/>
    <!-- Signal arcs -->
    <path d="M 32 18 C 36 22 36 26 32 30" fill="none" stroke="#00D4FF" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <path d="M 35 14 C 41 20 41 28 35 34" fill="none" stroke="#00D4FF" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </symbol>

  <!-- icon-live: Oscilloscope waveform -->
  <symbol id="icon-live" viewBox="0 0 48 48">
    <rect x="4" y="6" width="40" height="36" rx="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Grid lines -->
    <line x1="4" y1="24" x2="44" y2="24" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="24" y1="6" x2="24" y2="42" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>
    <!-- Waveform -->
    <polyline points="8,24 12,24 14,12 18,36 22,12 26,36 30,24 34,24 36,18 38,28 40,24"
              fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Glow dot at end -->
    <circle cx="40" cy="24" r="2" fill="#00D4FF" opacity="0.8"/>
  </symbol>

  <!-- icon-codes: Scan document with hex code -->
  <symbol id="icon-codes" viewBox="0 0 48 48">
    <!-- Document -->
    <path d="M 10 4 L 32 4 L 38 10 L 38 44 L 10 44 Z" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 32 4 L 32 10 L 38 10" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Hex code lines -->
    <line x1="15" y1="18" x2="33" y2="18" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="24" x2="28" y2="24" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="30" x2="30" y2="30" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
    <!-- Scan beam -->
    <line x1="6" y1="36" x2="42" y2="36" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
    <line x1="15" y1="36" x2="33" y2="36" stroke="#00E676" stroke-width="1.5" opacity="0.7"/>
  </symbol>

  <!-- icon-ai: Neural network nodes -->
  <symbol id="icon-ai" viewBox="0 0 48 48">
    <!-- Input layer -->
    <circle cx="10" cy="14" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="10" cy="24" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="10" cy="34" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Hidden layer -->
    <circle cx="24" cy="12" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="3.5" fill="#00D4FF" fill-opacity="0.2" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="24" cy="36" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Output layer -->
    <circle cx="38" cy="19" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="38" cy="29" r="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Connections -->
    <line x1="13" y1="14" x2="21" y2="12" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="14" x2="21" y2="24" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="24" x2="21" y2="12" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="24" x2="21" y2="24" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="24" x2="21" y2="36" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="34" x2="21" y2="24" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="13" y1="34" x2="21" y2="36" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="27" y1="12" x2="35" y2="19" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="27" y1="24" x2="35" y2="19" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="27" y1="24" x2="35" y2="29" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
    <line x1="27" y1="36" x2="35" y2="29" stroke="#00D4FF" stroke-width="0.7" opacity="0.4"/>
  </symbol>

  <!-- icon-logs: Timeline / tape reel -->
  <symbol id="icon-logs" viewBox="0 0 48 48">
    <!-- Timeline bar -->
    <line x1="8" y1="24" x2="40" y2="24" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Reel circles -->
    <circle cx="14" cy="24" r="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="34" cy="24" r="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Inner reel hubs -->
    <circle cx="14" cy="24" r="3" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <circle cx="34" cy="24" r="3" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <!-- Reel spokes -->
    <line x1="14" y1="16" x2="14" y2="21" stroke="#00D4FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="14" y1="27" x2="14" y2="32" stroke="#00D4FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="34" y1="16" x2="34" y2="21" stroke="#00D4FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="34" y1="27" x2="34" y2="32" stroke="#00D4FF" stroke-width="0.8" opacity="0.4"/>
    <!-- Tick marks on timeline -->
    <line x1="20" y1="22" x2="20" y2="26" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="24" y1="21" x2="24" y2="27" stroke="#00E676" stroke-width="1.5" opacity="0.6"/>
    <line x1="28" y1="22" x2="28" y2="26" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  </symbol>

  <!-- icon-terminal: Prompt with cursor -->
  <symbol id="icon-terminal" viewBox="0 0 48 48">
    <rect x="4" y="8" width="40" height="32" rx="3" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Title bar dots -->
    <circle cx="10" cy="14" r="1.5" fill="#FF1744" opacity="0.7"/>
    <circle cx="16" cy="14" r="1.5" fill="#FF8C00" opacity="0.7"/>
    <circle cx="22" cy="14" r="1.5" fill="#00E676" opacity="0.7"/>
    <!-- Divider -->
    <line x1="4" y1="19" x2="44" y2="19" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
    <!-- Prompt chevron -->
    <polyline points="10,26 16,29 10,32" fill="none" stroke="#00E676" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cursor block -->
    <rect x="20" y="26" width="8" height="2" fill="#00D4FF" opacity="0.8"/>
    <!-- Command text line -->
    <line x1="20" y1="27" x2="36" y2="27" stroke="#00D4FF" stroke-width="1" opacity="0"/>
  </symbol>

  <!-- icon-tests: Circular gauge with needle -->
  <symbol id="icon-tests" viewBox="0 0 48 48">
    <!-- Gauge arc -->
    <path d="M 10 34 A 16 16 0 1 1 38 34" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="12" y1="17" x2="15" y2="19" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
    <line x1="24" y1="10" x2="24" y2="13" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
    <line x1="36" y1="17" x2="33" y2="19" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
    <!-- Colored arc segments -->
    <path d="M 10 34 A 16 16 0 0 1 15 17" fill="none" stroke="#00E676" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 33 17 A 16 16 0 0 1 38 34" fill="none" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Needle -->
    <line x1="24" y1="28" x2="16" y2="18" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
    <!-- Center hub -->
    <circle cx="24" cy="28" r="3" fill="#0D1117" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="24" cy="28" r="1" fill="#00D4FF"/>
    <!-- Value text -->
    <text x="24" y="42" text-anchor="middle" fill="#00D4FF" font-size="6" font-family="monospace" opacity="0.7">2847</text>
  </symbol>

  <!-- icon-parts: Gear schematic -->
  <symbol id="icon-parts" viewBox="0 0 48 48">
    <!-- Outer gear -->
    <path d="M 22 6 L 26 6 L 27 10 L 31 11 L 34 8 L 37 11 L 34 15 L 36 18 L 40 17 L 41 21 L 37 23 L 37 27 L 41 28 L 40 32 L 36 31 L 34 34 L 37 37 L 34 40 L 31 37 L 27 39 L 26 43 L 22 43 L 21 39 L 17 37 L 14 40 L 11 37 L 14 34 L 12 31 L 8 32 L 7 28 L 11 27 L 11 23 L 7 21 L 8 17 L 12 18 L 14 15 L 11 11 L 14 8 L 17 11 L 21 10 Z"
          fill="none" stroke="#00D4FF" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Inner circle -->
    <circle cx="24" cy="24" r="8" fill="none" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Center dot -->
    <circle cx="24" cy="24" r="2" fill="#00D4FF" opacity="0.5"/>
    <!-- Dimension lines -->
    <line x1="16" y1="24" x2="8" y2="24" stroke="#00D4FF" stroke-width="0.5" opacity="0.3" stroke-dasharray="1,2"/>
    <line x1="32" y1="24" x2="40" y2="24" stroke="#00D4FF" stroke-width="0.5" opacity="0.3" stroke-dasharray="1,2"/>
  </symbol>

  <!-- icon-forums: Speech bubble with circuit trace -->
  <symbol id="icon-forums" viewBox="0 0 48 48">
    <!-- Speech bubble -->
    <path d="M 8 10 L 40 10 Q 44 10 44 14 L 44 30 Q 44 34 40 34 L 20 34 L 12 42 L 14 34 L 8 34 Q 4 34 4 30 L 4 14 Q 4 10 8 10 Z"
          fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Circuit traces inside -->
    <line x1="12" y1="18" x2="20" y2="18" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="18" x2="20" y2="22" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="22" x2="28" y2="22" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="22" x2="28" y2="26" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="26" x2="36" y2="26" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <!-- Junction nodes -->
    <circle cx="20" cy="18" r="1.5" fill="#00D4FF" opacity="0.6"/>
    <circle cx="20" cy="22" r="1.5" fill="#00D4FF" opacity="0.6"/>
    <circle cx="28" cy="22" r="1.5" fill="#00D4FF" opacity="0.6"/>
    <circle cx="28" cy="26" r="1.5" fill="#00D4FF" opacity="0.6"/>
  </symbol>

  <!-- icon-sensors: Chip / circuit node -->
  <symbol id="icon-sensors" viewBox="0 0 48 48">
    <!-- IC chip body -->
    <rect x="14" y="14" width="20" height="20" rx="2" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Inner die -->
    <rect x="19" y="19" width="10" height="10" rx="1" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-width="0.8"/>
    <!-- Top pins -->
    <line x1="20" y1="8" x2="20" y2="14" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="24" y1="8" x2="24" y2="14" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="28" y1="8" x2="28" y2="14" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Bottom pins -->
    <line x1="20" y1="34" x2="20" y2="40" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="24" y1="34" x2="24" y2="40" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="28" y1="34" x2="28" y2="40" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Left pins -->
    <line x1="8" y1="20" x2="14" y2="20" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="8" y1="24" x2="14" y2="24" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="8" y1="28" x2="14" y2="28" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Right pins -->
    <line x1="34" y1="20" x2="40" y2="20" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="34" y1="24" x2="40" y2="24" stroke="#00D4FF" stroke-width="1.2"/>
    <line x1="34" y1="28" x2="40" y2="28" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Pin end dots -->
    <circle cx="20" cy="8" r="1" fill="#00D4FF" opacity="0.5"/>
    <circle cx="24" cy="8" r="1" fill="#00D4FF" opacity="0.5"/>
    <circle cx="28" cy="8" r="1" fill="#00D4FF" opacity="0.5"/>
    <circle cx="20" cy="40" r="1" fill="#00D4FF" opacity="0.5"/>
    <circle cx="24" cy="40" r="1" fill="#00D4FF" opacity="0.5"/>
    <circle cx="28" cy="40" r="1" fill="#00D4FF" opacity="0.5"/>
  </symbol>
</svg>