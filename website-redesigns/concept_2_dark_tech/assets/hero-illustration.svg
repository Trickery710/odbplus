<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <!-- Ambient cyan glow behind phone -->
    <radialGradient id="ambientGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Screen gradient -->
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <!-- Scan line pattern -->
    <pattern id="scanLines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="2" fill="transparent"/>
      <rect x="0" y="2" width="4" height="2" fill="#00D4FF" opacity="0.015"/>
    </pattern>
    <!-- Gauge gradient -->
    <linearGradient id="gaugeGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="gaugeRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF1744"/>
    </linearGradient>
    <!-- Phone shadow -->
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#00D4FF" flood-opacity="0.2"/>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow background -->
  <rect width="500" height="600" fill="url(#ambientGlow)"/>

  <!-- Decorative circuit traces in background -->
  <g opacity="0.15" stroke="#00D4FF" stroke-width="0.8" fill="none">
    <path d="M 50 100 L 120 100 L 120 180"/>
    <path d="M 380 80 L 380 140 L 430 140"/>
    <path d="M 60 450 L 110 450 L 110 500 L 160 500"/>
    <path d="M 400 420 L 400 480 L 350 480"/>
    <circle cx="120" cy="100" r="3" fill="#00D4FF" opacity="0.3"/>
    <circle cx="380" cy="140" r="3" fill="#00D4FF" opacity="0.3"/>
    <circle cx="110" cy="450" r="3" fill="#00D4FF" opacity="0.3"/>
    <circle cx="400" cy="480" r="3" fill="#00D4FF" opacity="0.3"/>
  </g>

  <!-- Phone frame -->
  <g filter="url(#phoneShadow)">
    <!-- Phone body -->
    <rect x="140" y="60" width="220" height="460" rx="24" fill="#1A1A2E" stroke="#2A3A4E" stroke-width="2"/>
    <!-- Screen bezel -->
    <rect x="152" y="85" width="196" height="410" rx="8" fill="url(#screenBg)"/>
    <!-- Scan line overlay -->
    <rect x="152" y="85" width="196" height="410" rx="8" fill="url(#scanLines)"/>
    <!-- Notch -->
    <rect x="210" y="60" width="80" height="16" rx="8" fill="#1A1A2E"/>
    <circle cx="250" cy="72" r="4" fill="#2A3A4E"/>

    <!-- Status bar -->
    <text x="165" y="102" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8B949E">12:47</text>
    <text x="332" y="102" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8B949E" text-anchor="end">87%</text>
    <!-- Battery icon -->
    <rect x="335" y="96" width="10" height="6" rx="1" fill="none" stroke="#8B949E" stroke-width="0.8"/>
    <rect x="345" y="98" width="2" height="2" rx="0.5" fill="#8B949E"/>
    <rect x="336" y="97" width="7" height="4" rx="0.5" fill="#00E676" opacity="0.7"/>

    <!-- Connected status chip -->
    <rect x="170" y="112" width="160" height="22" rx="11" fill="#00E676" fill-opacity="0.1" stroke="#00E676" stroke-width="0.8"/>
    <circle cx="183" cy="123" r="3" fill="#00E676"/>
    <text x="192" y="127" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00E676" font-weight="600">CONNECTED  --  KWP2000</text>

    <!-- RPM Gauge -->
    <g transform="translate(250, 210)">
      <!-- Gauge background arc -->
      <path d="M -55 20 A 58 58 0 1 1 55 20" fill="none" stroke="#2A3A4E" stroke-width="6" stroke-linecap="round"/>
      <!-- Green zone -->
      <path d="M -55 20 A 58 58 0 0 1 -20 -54" fill="none" stroke="url(#gaugeGreen)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
      <!-- Current value arc -->
      <path d="M -55 20 A 58 58 0 0 1 35 -46" fill="none" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
      <!-- Red zone -->
      <path d="M 40 -44 A 58 58 0 0 1 55 20" fill="none" stroke="url(#gaugeRed)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
      <!-- Needle -->
      <line x1="0" y1="0" x2="25" y2="-40" stroke="#E6EDF3" stroke-width="2" stroke-linecap="round"/>
      <!-- Center hub -->
      <circle cx="0" cy="0" r="5" fill="#0D1117" stroke="#00D4FF" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#00D4FF"/>
      <!-- RPM value -->
      <text x="0" y="30" text-anchor="middle" font-family="'Oxanium', 'Space Grotesk', sans-serif" font-size="28" fill="#E6EDF3" font-weight="700" filter="url(#textGlow)">2847</text>
      <text x="0" y="42" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#8B949E">RPM</text>
      <!-- Tick marks -->
      <g stroke="#8B949E" stroke-width="0.5" opacity="0.4">
        <line x1="-52" y1="14" x2="-46" y2="12"/>
        <line x1="-50" y1="-10" x2="-44" y2="-8"/>
        <line x1="-38" y1="-32" x2="-34" y2="-28"/>
        <line x1="-20" y1="-48" x2="-18" y2="-42"/>
        <line x1="0" y1="-54" x2="0" y2="-48"/>
        <line x1="20" y1="-48" x2="18" y2="-42"/>
        <line x1="38" y1="-32" x2="34" y2="-28"/>
        <line x1="50" y1="-10" x2="44" y2="-8"/>
        <line x1="52" y1="14" x2="46" y2="12"/>
      </g>
    </g>

    <!-- Temperature bar -->
    <g transform="translate(170, 280)">
      <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="8" fill="#8B949E">COOLANT TEMP</text>
      <rect x="0" y="6" width="160" height="8" rx="4" fill="#2A3A4E"/>
      <rect x="0" y="6" width="106" height="8" rx="4" fill="#00D4FF" opacity="0.8"/>
      <text x="165" y="14" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00E676" font-weight="600" filter="url(#textGlow)">89C</text>
    </g>

    <!-- Live PID list -->
    <g transform="translate(170, 315)">
      <!-- Header -->
      <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8B949E" letter-spacing="1">LIVE DATA</text>
      <line x1="0" y1="6" x2="160" y2="6" stroke="#2A3A4E" stroke-width="0.5"/>

      <!-- PID rows -->
      <text x="0" y="22" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">RPM</text>
      <text x="160" y="22" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00E676" text-anchor="end" filter="url(#textGlow)">2847</text>

      <line x1="0" y1="28" x2="160" y2="28" stroke="#2A3A4E" stroke-width="0.3" opacity="0.5"/>

      <text x="0" y="42" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">COOLANT</text>
      <text x="160" y="42" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00E676" text-anchor="end" filter="url(#textGlow)">89 C</text>

      <line x1="0" y1="48" x2="160" y2="48" stroke="#2A3A4E" stroke-width="0.3" opacity="0.5"/>

      <text x="0" y="62" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">O2 BANK1</text>
      <text x="160" y="62" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00E676" text-anchor="end" filter="url(#textGlow)">0.45V</text>

      <line x1="0" y1="68" x2="160" y2="68" stroke="#2A3A4E" stroke-width="0.3" opacity="0.5"/>

      <text x="0" y="82" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">MAF RATE</text>
      <text x="160" y="82" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00E676" text-anchor="end" filter="url(#textGlow)">4.21 g/s</text>

      <line x1="0" y1="88" x2="160" y2="88" stroke="#2A3A4E" stroke-width="0.3" opacity="0.5"/>

      <text x="0" y="102" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">FUEL TRIM</text>
      <text x="160" y="102" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00D4FF" text-anchor="end" filter="url(#textGlow)">+2.3%</text>

      <line x1="0" y1="108" x2="160" y2="108" stroke="#2A3A4E" stroke-width="0.3" opacity="0.5"/>

      <text x="0" y="122" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8B949E">MAP</text>
      <text x="160" y="122" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#00E676" text-anchor="end" filter="url(#textGlow)">34 kPa</text>
    </g>

    <!-- Bottom navigation bar -->
    <rect x="152" y="470" width="196" height="25" rx="0 0 8 8" fill="#151B23"/>
    <line x1="152" y1="470" x2="348" y2="470" stroke="#2A3A4E" stroke-width="0.5"/>
    <!-- Nav dots -->
    <circle cx="200" cy="482" r="3" fill="#00D4FF"/>
    <circle cx="230" cy="482" r="3" fill="#8B949E" opacity="0.4"/>
    <circle cx="260" cy="482" r="3" fill="#8B949E" opacity="0.4"/>
    <circle cx="290" cy="482" r="3" fill="#8B949E" opacity="0.4"/>
  </g>

  <!-- Floating data particles -->
  <g opacity="0.3">
    <circle cx="100" cy="200" r="2" fill="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="250" r="1.5" fill="#00E676">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="380" r="1" fill="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="400" r="2" fill="#00D4FF">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>