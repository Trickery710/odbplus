<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle ambient glow for the bracket -->
    <filter id="glowAmbient" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Circuit trace gradient -->
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.1"/>
      <stop offset="20%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal bracket — left -->
  <path d="M 30 10 L 18 20 L 18 60 L 30 70"
        fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"
        filter="url(#glowAmbient)" opacity="0.7"/>
  <!-- Hexagonal bracket — right -->
  <path d="M 270 10 L 282 20 L 282 60 L 270 70"
        fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"
        filter="url(#glowAmbient)" opacity="0.7"/>

  <!-- Main text: ODB -->
  <text x="90" y="52" font-family="'Oxanium', 'Space Grotesk', 'Rajdhani', sans-serif"
        font-size="42" font-weight="700" fill="#E6EDF3" letter-spacing="4"
        filter="url(#glowCyan)">ODB</text>

  <!-- Plus symbol -->
  <text x="220" y="52" font-family="'Oxanium', 'Space Grotesk', 'Rajdhani', sans-serif"
        font-size="42" font-weight="700" fill="#00D4FF" letter-spacing="2"
        filter="url(#glowCyan)">+</text>

  <!-- Circuit trace underline -->
  <line x1="40" y1="64" x2="260" y2="64"
        stroke="url(#traceGrad)" stroke-width="1.5"/>
  <!-- Junction nodes on the trace -->
  <circle cx="70" cy="64" r="2" fill="#00D4FF" opacity="0.6"/>
  <circle cx="150" cy="64" r="2.5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="230" cy="64" r="2" fill="#00D4FF" opacity="0.6"/>
  <!-- Branch traces -->
  <line x1="70" y1="64" x2="70" y2="70" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="64" x2="230" y2="70" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <circle cx="70" cy="70" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="230" cy="70" r="1.5" fill="#00D4FF" opacity="0.3"/>
</svg>