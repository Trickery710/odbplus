<section class="hero" aria-labelledby="hero-heading">
  <div class="hero__bg" aria-hidden="true">
    <!-- Radial gradient ambience -->
  </div>

  <div class="hero__inner">
    <div class="hero__content">
      <div class="hero__badge">
        <span class="dot" aria-hidden="true"></span>
        <span>Android OBD-II Diagnostics</span>
      </div>

      <h1 id="hero-heading" class="hero__title">
        Vehicle<br>
        <span class="glitch accent" data-text="Intelligence.">Intelligence.</span><br>
        <span class="accent">Elevated.</span>
      </h1>

      <div class="hero__terminal" aria-label="Terminal animation showing connection sequence">

        <span><span class="prompt">&gt;</span> AI Analysis Ready <span class="cursor" aria-hidden="true"></span></span>

    <div class="hero__illustration">

    </div>
  </div>

  <!-- Decorative waveform at bottom -->
  <div class="waveform" aria-hidden="true" style="position: absolute; bottom: 0; left: 0; right: 0;">

      <path d="M0,20 Q50,35 100,20 T200,20 T300,20 T400,20 T500,20 T600,20 T700,20 T800,20 T900,20 T1000,20 T1100,20 T1200,20"
            fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.2"/>
