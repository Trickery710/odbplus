          </filter>

        <text x="90" y="52" font-family="Oxanium, sans-serif" font-size="42" font-weight="700" fill="#E6EDF3" letter-spacing="4" filter="url(#navGlow)">ODB</text>

<script>
  (function() {
    const toggle = document.querySelector('.navbar__toggle');
    const panel = document.querySelector('.navbar__mobile-panel');
    if (!toggle || !panel) return;

    toggle.addEventListener('click', function() {
      const isOpen = panel.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen);

      /* Animate hamburger to X */
      const spans = toggle.querySelectorAll('span');
      if (isOpen) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans[0].style.transform = '';
        spans[1].style.opacity = '';
        spans[2].style.transform = '';
      }
    });

    /* Close on link click */
    panel.querySelectorAll('.navbar__link, .btn').forEach(function(link) {
      link.addEventListener('click', function() {
        panel.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.querySelectorAll('span').forEach(function(s) {
          s.style.transform = '';
          s.style.opacity = '';
        });
      });
    });
  })();
</script>
