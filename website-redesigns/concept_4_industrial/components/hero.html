<section class="hero" aria-labelledby="heroHeadline">
  <div class="hero__grid-overlay" aria-hidden="true"></div>

  <div class="container hero__content">
    <div class="hero__text">
      <span class="section-label">System Status: Online</span>

      <h1 id="heroHeadline" class="hero__headline">
        Raw Power.
        <span class="accent">Real Diagnosis.</span>
      </h1>

      <p class="hero__sub">
        Professional OBD-II diagnostics for Android. AI-powered fault analysis,
        live data monitoring, and 18,000+ error codes at your fingertips.
      </p>

      <div class="hero__actions">
        <a href="#download" class="btn btn--stripe btn--lg">Get Started</a>
        <a href="#demo" class="btn btn--secondary btn--lg">View Demo</a>
      </div>

      <div class="hero__badges" aria-label="Supported protocols and features">
        <span class="hero__badge">ELM327</span>
        <span class="hero__badge">KWP2000</span>
        <span class="hero__badge">CAN Bus</span>
        <span class="hero__badge">AI Analysis</span>
      </div>
    </div>

    <div class="hero__illustration" aria-hidden="true">
      <svg viewBox="0 0 420 440" width="420" height="440">
        <defs>
          <radialGradient id="heroGaugeFace" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2A2A2A"/>
            <stop offset="100%" stop-color="#1C1C1C"/>
          </radialGradient>
          <filter id="heroGlow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feFlood flood-color="#FF6B00" flood-opacity="0.35"/>
            <feComposite in2="b" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="heroRivet" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#888"/>
            <stop offset="100%" stop-color="#333"/>
          </radialGradient>
        </defs>

        <!-- Blueprint grid background -->
        <rect width="420" height="440" fill="#151A20" rx="4"/>
        <g stroke="#2A3A4A" stroke-width="0.4" opacity="0.5">
          <line x1="0" y1="0" x2="0" y2="440"/><line x1="20" y1="0" x2="20" y2="440"/>
          <line x1="40" y1="0" x2="40" y2="440"/><line x1="60" y1="0" x2="60" y2="440"/>
          <line x1="80" y1="0" x2="80" y2="440"/><line x1="100" y1="0" x2="100" y2="440"/>
          <line x1="120" y1="0" x2="120" y2="440"/><line x1="140" y1="0" x2="140" y2="440"/>

          <line x1="200" y1="0" x2="200" y2="440"/><line x1="220" y1="0" x2="220" y2="440"/>
          <line x1="240" y1="0" x2="240" y2="440"/><line x1="260" y1="0" x2="260" y2="440"/>
          <line x1="280" y1="0" x2="280" y2="440"/><line x1="300" y1="0" x2="300" y2="440"/>
          <line x1="320" y1="0" x2="320" y2="440"/><line x1="340" y1="0" x2="340" y2="440"/>
          <line x1="360" y1="0" x2="360" y2="440"/><line x1="380" y1="0" x2="380" y2="440"/>
          <line x1="400" y1="0" x2="400" y2="440"/><line x1="420" y1="0" x2="420" y2="440"/>
          <line x1="0" y1="0" x2="420" y2="0"/><line x1="0" y1="20" x2="420" y2="20"/>
          <line x1="0" y1="40" x2="420" y2="40"/><line x1="0" y1="60" x2="420" y2="60"/>
          <line x1="0" y1="80" x2="420" y2="80"/><line x1="0" y1="100" x2="420" y2="100"/>
          <line x1="0" y1="120" x2="420" y2="120"/><line x1="0" y1="140" x2="420" y2="140"/>
          <line x1="0" y1="160" x2="420" y2="160"/><line x1="0" y1="180" x2="420" y2="180"/>
          <line x1="0" y1="200" x2="420" y2="200"/><line x1="0" y1="220" x2="420" y2="220"/>
          <line x1="0" y1="240" x2="420" y2="240"/><line x1="0" y1="260" x2="420" y2="260"/>
          <line x1="0" y1="280" x2="420" y2="280"/><line x1="0" y1="300" x2="420" y2="300"/>
          <line x1="0" y1="320" x2="420" y2="320"/><line x1="0" y1="340" x2="420" y2="340"/>
          <line x1="0" y1="360" x2="420" y2="360"/><line x1="0" y1="380" x2="420" y2="380"/>
          <line x1="0" y1="400" x2="420" y2="400"/><line x1="0" y1="420" x2="420" y2="420"/>
          <line x1="0" y1="440" x2="420" y2="440"/>
        </g>

        <!-- Rivet border plate -->
        <rect x="40" y="20" width="340" height="400" rx="16" fill="#2A2A2A" stroke="#444" stroke-width="2.5"/>

        <!-- Corner rivets -->
        <circle cx="56" cy="36" r="7" fill="url(#heroRivet)" stroke="#555" stroke-width="1"/>
        <circle cx="56" cy="36" r="2.5" fill="#444"/>
        <circle cx="364" cy="36" r="7" fill="url(#heroRivet)" stroke="#555" stroke-width="1"/>
        <circle cx="364" cy="36" r="2.5" fill="#444"/>
        <circle cx="56" cy="404" r="7" fill="url(#heroRivet)" stroke="#555" stroke-width="1"/>
        <circle cx="56" cy="404" r="2.5" fill="#444"/>
        <circle cx="364" cy="404" r="7" fill="url(#heroRivet)" stroke="#555" stroke-width="1"/>
        <circle cx="364" cy="404" r="2.5" fill="#444"/>

        <!-- Phone body -->
        <rect x="60" y="30" width="300" height="380" rx="14" fill="#1A1A1A" stroke="#444" stroke-width="1.5"/>

        <!-- Status bar -->
        <rect x="70" y="40" width="280" height="22" rx="4" fill="#111"/>
        <text x="82" y="55" font-family="'Roboto Mono',monospace" font-size="9" fill="#FF6B00" font-weight="700">ODB+ DIAGNOSTICS</text>
        <circle cx="310" cy="51" r="4" fill="#4CAF50" opacity="0.3"/>
        <circle cx="310" cy="51" r="2" fill="#4CAF50"/>
        <text x="318" y="54" font-family="'Roboto Mono',monospace" font-size="7" fill="#4CAF50">LIVE</text>

        <!-- Screen area -->
        <rect x="70" y="66" width="280" height="334" rx="4" fill="#111"/>

        <!-- RPM Gauge (main) -->
        <g transform="translate(210, 160)">
          <circle cx="0" cy="0" r="70" fill="url(#heroGaugeFace)" stroke="#444" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="64" fill="none" stroke="#333" stroke-width="1"/>

          <!-- Scale arc -->
          <path d="M-56,14 A60,60 0 1,1 56,14" fill="none" stroke="#444" stroke-width="1.5"/>

          <!-- Tick marks -->
          <line x1="-58" y1="14" x2="-50" y2="12" stroke="#666" stroke-width="1.5"/>
          <line x1="-56" y1="-14" x2="-48" y2="-12" stroke="#666" stroke-width="1.5"/>
          <line x1="-42" y1="-38" x2="-36" y2="-32" stroke="#666" stroke-width="1.5"/>
          <line x1="-20" y1="-54" x2="-18" y2="-46" stroke="#666" stroke-width="1.5"/>
          <line x1="0" y1="-58" x2="0" y2="-50" stroke="#666" stroke-width="1.5"/>
          <line x1="20" y1="-54" x2="18" y2="-46" stroke="#666" stroke-width="1.5"/>
          <line x1="42" y1="-38" x2="36" y2="-32" stroke="#FF6B00" stroke-width="1.5"/>

          <line x1="58" y1="14" x2="50" y2="12" stroke="#CC2200" stroke-width="2"/>

          <text x="-50" y="26" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">0</text>
          <text x="-48" y="-8" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">1</text>
          <text x="-32" y="-34" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">2</text>
          <text x="0" y="-46" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">3</text>
          <text x="32" y="-34" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">4</text>
          <text x="48" y="-8" font-family="monospace" font-size="7" fill="#FF6B00" text-anchor="middle">5</text>
          <text x="50" y="26" font-family="monospace" font-size="7" fill="#CC2200" text-anchor="middle">6</text>

          <!-- Needle -->
          <line x1="0" y1="10" x2="16" y2="-46" stroke="#FF6B00" stroke-width="3" stroke-linecap="round" filter="url(#heroGlow)"/>
          <circle cx="0" cy="0" r="7" fill="#2A2A2A" stroke="#FF6B00" stroke-width="2"/>
          <circle cx="0" cy="0" r="3" fill="#FF6B00"/>

          <!-- Digital readout -->
          <rect x="-28" y="22" width="56" height="22" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
          <text x="0" y="38" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="16" font-weight="700" fill="#FF6B00">2847</text>
          <text x="0" y="52" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#777">RPM x1000</text>
        </g>

        <!-- Temperature mini gauge -->
        <g transform="translate(120, 300)">
          <circle cx="0" cy="0" r="36" fill="url(#heroGaugeFace)" stroke="#444" stroke-width="2"/>
          <path d="M-28,16 A32,32 0 0,1 -24,-20" fill="none" stroke="#4A7FA5" stroke-width="3"/>
          <path d="M-24,-20 A32,32 0 0,1 24,-20" fill="none" stroke="#4CAF50" stroke-width="3"/>
          <path d="M24,-20 A32,32 0 0,1 28,16" fill="none" stroke="#CC2200" stroke-width="3"/>
          <line x1="0" y1="6" x2="6" y2="-26" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" filter="url(#heroGlow)"/>
          <circle cx="0" cy="0" r="4" fill="#2A2A2A" stroke="#FF6B00" stroke-width="1.5"/>
          <text x="0" y="18" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="11" font-weight="700" fill="#F0F0F0">195</text>
          <text x="0" y="26" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="6" fill="#777">COOLANT F</text>
        </g>

        <!-- Oil pressure mini gauge -->
        <g transform="translate(300, 300)">
          <circle cx="0" cy="0" r="36" fill="url(#heroGaugeFace)" stroke="#444" stroke-width="2"/>
          <path d="M-28,16 A32,32 0 0,1 -24,-20" fill="none" stroke="#CC2200" stroke-width="3"/>
          <path d="M-24,-20 A32,32 0 0,1 28,16" fill="none" stroke="#4CAF50" stroke-width="3"/>
          <line x1="0" y1="6" x2="18" y2="-20" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" filter="url(#heroGlow)"/>
          <circle cx="0" cy="0" r="4" fill="#2A2A2A" stroke="#FF6B00" stroke-width="1.5"/>

          <text x="0" y="26" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="6" fill="#777">OIL PSI</text>

        <!-- Data strip at bottom -->
        <g transform="translate(70, 354)">
          <rect x="0" y="0" width="280" height="40" rx="3" fill="#0A0E14" stroke="#333" stroke-width="0.5"/>
          <text x="10" y="14" font-family="'Roboto Mono',monospace" font-size="8" fill="#4A7FA5">SPEED</text>
          <text x="180" y="14" font-family="'Roboto Mono',monospace" font-size="8" fill="#FF6B00" text-anchor="end">62 MPH</text>
          <line x1="6" y1="18" x2="274" y2="18" stroke="#333" stroke-width="0.4"/>
          <text x="10" y="32" font-family="'Roboto Mono',monospace" font-size="8" fill="#4A7FA5">FUEL TRIM</text>
          <text x="180" y="32" font-family="'Roboto Mono',monospace" font-size="8" fill="#4CAF50" text-anchor="end">+2.3%</text>
          <circle cx="220" cy="10" r="3.5" fill="#4CAF50" opacity="0.25"/>
          <circle cx="220" cy="10" r="1.8" fill="#4CAF50"/>
          <text x="228" y="14" font-family="'Roboto Mono',monospace" font-size="6" fill="#4CAF50">ECU CONNECTED</text>
        </g>
      </svg>

  </div>
</section>
