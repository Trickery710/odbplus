<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Blueprint grid pattern -->
    <pattern id="blueprintGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <line x1="0" y1="0" x2="20" y2="0" stroke="#2A3A4A" stroke-width="0.3"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#2A3A4A" stroke-width="0.3"/>
    </pattern>
    <pattern id="blueprintGridLarge" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#blueprintGrid)"/>
      <line x1="0" y1="0" x2="100" y2="0" stroke="#2A3A4A" stroke-width="0.6"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#2A3A4A" stroke-width="0.6"/>
    </pattern>

    <!-- Gauge face gradient -->
    <radialGradient id="gaugeFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1C1C1C"/>
    </radialGradient>

    <!-- Orange glow -->
    <filter id="orangeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF6B00" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Phone screen gradient -->
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <!-- Metal rivet gradient -->
    <radialGradient id="rivetGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="50%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#333333"/>
    </radialGradient>

    <!-- Cable gradient -->
    <linearGradient id="cableGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="50%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <!-- Background: blueprint grid -->
  <rect width="500" height="500" fill="#151A20"/>
  <rect width="500" height="500" fill="url(#blueprintGridLarge)"/>

  <!-- Dimension lines (blueprint style) -->
  <line x1="40" y1="460" x2="460" y2="460" stroke="#4A7FA5" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="40" y1="456" x2="40" y2="464" stroke="#4A7FA5" stroke-width="0.5"/>
  <line x1="460" y1="456" x2="460" y2="464" stroke="#4A7FA5" stroke-width="0.5"/>
  <text x="250" y="472" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="8" fill="#4A7FA5">420mm</text>

  <!-- OBD-II Port (bottom-left area) -->
  <g transform="translate(60, 300)">
    <!-- Port housing -->
    <rect x="0" y="0" width="100" height="50" rx="5" fill="#2A2A2A" stroke="#444444" stroke-width="2"/>
    <rect x="5" y="5" width="90" height="40" rx="3" fill="#1C1C1C" stroke="#333333" stroke-width="1"/>
    <!-- Pin rows (16 pin OBD-II) -->
    <g transform="translate(12, 14)">
      <!-- Top row: 8 pins -->
      <rect x="0" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="9" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="18" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="27" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="36" y="0" width="4" height="8" rx="0.5" fill="#FF6B00"/>
      <rect x="45" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="54" y="0" width="4" height="8" rx="0.5" fill="#FF6B00"/>
      <rect x="63" y="0" width="4" height="8" rx="0.5" fill="#888888"/>
      <!-- Bottom row: 8 pins -->
      <rect x="4" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="13" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="22" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="31" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="40" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="49" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
      <rect x="58" y="14" width="4" height="8" rx="0.5" fill="#FF6B00"/>
      <rect x="67" y="14" width="4" height="8" rx="0.5" fill="#888888"/>
    </g>
    <!-- Label -->
    <text x="50" y="62" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="8" fill="#4A7FA5">OBD-II DLC [J1962]</text>
  </g>

  <!-- Cable from port to phone -->
  <path d="M160,325 C200,325 180,280 220,250 Q240,235 260,220 C280,205 290,200 300,200"
        fill="none" stroke="url(#cableGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Cable inner wire -->
  <path d="M160,325 C200,325 180,280 220,250 Q240,235 260,220 C280,205 290,200 300,200"
        fill="none" stroke="#555555" stroke-width="3" stroke-linecap="round"/>
  <!-- Cable connector at port end -->
  <rect x="148" y="318" width="16" height="14" rx="3" fill="#444444" stroke="#555555" stroke-width="1"/>
  <!-- Cable connector at phone end -->
  <rect x="296" y="194" width="12" height="12" rx="2" fill="#444444" stroke="#555555" stroke-width="1"/>

  <!-- Bluetooth signal waves (wireless indicator) -->
  <g transform="translate(275, 180)">
    <path d="M0,0 L6,-8 L-4,-4 L6,4 L0,-8 Z" fill="none" stroke="#4A7FA5" stroke-width="1.5"/>
    <path d="M10,-6 A8,8 0 0,1 10,6" fill="none" stroke="#4A7FA5" stroke-width="1" opacity="0.6"/>
    <path d="M13,-10 A12,12 0 0,1 13,10" fill="none" stroke="#4A7FA5" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Phone with mechanical rivet border -->
  <g transform="translate(260, 60)">
    <!-- Outer rivet border plate -->
    <rect x="-12" y="-12" width="184" height="344" rx="14" fill="#333333" stroke="#444444" stroke-width="2"/>

    <!-- Corner rivets -->
    <circle cx="4" cy="4" r="6" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="4" cy="4" r="2" fill="#444444"/>
    <circle cx="156" cy="4" r="6" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="156" cy="4" r="2" fill="#444444"/>
    <circle cx="4" cy="316" r="6" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="4" cy="316" r="2" fill="#444444"/>
    <circle cx="156" cy="316" r="6" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="156" cy="316" r="2" fill="#444444"/>

    <!-- Mid-side rivets -->
    <circle cx="-6" cy="160" r="5" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="-6" cy="160" r="1.5" fill="#444444"/>
    <circle cx="166" cy="160" r="5" fill="url(#rivetGrad)" stroke="#555555" stroke-width="1"/>
    <circle cx="166" cy="160" r="1.5" fill="#444444"/>

    <!-- Phone body -->
    <rect x="0" y="0" width="160" height="320" rx="12" fill="#1A1A1A" stroke="#444444" stroke-width="1.5"/>

    <!-- Status bar -->
    <rect x="8" y="8" width="144" height="18" rx="4" fill="#111111"/>
    <text x="16" y="20" font-family="'Share Tech Mono', monospace" font-size="7" fill="#FF6B00">ODB+ DIAGNOSTICS</text>
    <text x="128" y="20" font-family="'Share Tech Mono', monospace" font-size="7" fill="#4CAF50">LIVE</text>

    <!-- Phone screen content area -->
    <rect x="8" y="30" width="144" height="278" rx="4" fill="url(#screenBg)"/>

    <!-- === RPM GAUGE (main, center-top) === -->
    <g transform="translate(80, 100)">
      <!-- Gauge outer ring -->
      <circle cx="0" cy="0" r="52" fill="none" stroke="#444444" stroke-width="2"/>
      <circle cx="0" cy="0" r="48" fill="url(#gaugeFace)"/>
      <circle cx="0" cy="0" r="46" fill="none" stroke="#333333" stroke-width="1"/>

      <!-- Scale arc (bottom half open) -->
      <path d="M-40,-24 A46,46 0 1,1 40,-24" fill="none" stroke="#555555" stroke-width="1.5"/>

      <!-- Tick marks around the arc -->
      <line x1="-42" y1="10" x2="-36" y2="8" stroke="#666666" stroke-width="1.5"/>
      <line x1="-40" y1="-8" x2="-34" y2="-6" stroke="#666666" stroke-width="1.5"/>
      <line x1="-32" y1="-24" x2="-28" y2="-20" stroke="#666666" stroke-width="1.5"/>
      <line x1="-18" y1="-36" x2="-16" y2="-30" stroke="#666666" stroke-width="1.5"/>
      <line x1="0" y1="-42" x2="0" y2="-36" stroke="#666666" stroke-width="1.5"/>
      <line x1="18" y1="-36" x2="16" y2="-30" stroke="#666666" stroke-width="1.5"/>
      <line x1="32" y1="-24" x2="28" y2="-20" stroke="#FF6B00" stroke-width="1.5"/>
      <line x1="40" y1="-8" x2="34" y2="-6" stroke="#FF6B00" stroke-width="1.5"/>
      <line x1="42" y1="10" x2="36" y2="8" stroke="#CC2200" stroke-width="2"/>

      <!-- Tick labels -->
      <text x="-38" y="18" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA" text-anchor="middle">0</text>
      <text x="-34" y="-4" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA" text-anchor="middle">1</text>
      <text x="-22" y="-24" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA" text-anchor="middle">2</text>
      <text x="0" y="-34" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA" text-anchor="middle">3</text>
      <text x="22" y="-24" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA" text-anchor="middle">4</text>
      <text x="34" y="-4" font-family="'Share Tech Mono', monospace" font-size="5" fill="#FF6B00" text-anchor="middle">5</text>
      <text x="38" y="18" font-family="'Share Tech Mono', monospace" font-size="5" fill="#CC2200" text-anchor="middle">6</text>

      <!-- Needle pointing to ~2800 RPM -->
      <line x1="0" y1="8" x2="10" y2="-32" stroke="#FF6B00" stroke-width="2.5" filter="url(#orangeGlow)"/>
      <circle cx="0" cy="0" r="5" fill="#333333" stroke="#FF6B00" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B00"/>

      <!-- RPM readout -->
      <text x="0" y="22" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="14" font-weight="bold" fill="#FF6B00">2847</text>
      <text x="0" y="30" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="6" fill="#AAAAAA">RPM x1000</text>
    </g>

    <!-- === TEMPERATURE GAUGE (bottom-left) === -->
    <g transform="translate(44, 210)">
      <circle cx="0" cy="0" r="28" fill="url(#gaugeFace)" stroke="#444444" stroke-width="1.5"/>

      <!-- Scale arc -->
      <path d="M-22,12 A26,26 0 1,1 22,12" fill="none" stroke="#555555" stroke-width="1"/>

      <!-- Color zones -->
      <path d="M-22,12 A26,26 0 0,1 -18,-16" fill="none" stroke="#4A7FA5" stroke-width="2.5"/>
      <path d="M-18,-16 A26,26 0 0,1 18,-16" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
      <path d="M18,-16 A26,26 0 0,1 22,12" fill="none" stroke="#CC2200" stroke-width="2.5"/>

      <!-- Needle (normal temp range) -->
      <line x1="0" y1="4" x2="4" y2="-20" stroke="#FF6B00" stroke-width="2" filter="url(#orangeGlow)"/>
      <circle cx="0" cy="0" r="3" fill="#333333" stroke="#FF6B00" stroke-width="1"/>

      <!-- Label -->
      <text x="0" y="14" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="8" font-weight="bold" fill="#F0F0F0">195</text>
      <text x="0" y="20" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA">COOLANT F</text>
    </g>

    <!-- === OIL PRESSURE GAUGE (bottom-right) === -->
    <g transform="translate(116, 210)">
      <circle cx="0" cy="0" r="28" fill="url(#gaugeFace)" stroke="#444444" stroke-width="1.5"/>

      <!-- Scale arc -->
      <path d="M-22,12 A26,26 0 1,1 22,12" fill="none" stroke="#555555" stroke-width="1"/>

      <!-- Color zones -->
      <path d="M-22,12 A26,26 0 0,1 -18,-16" fill="none" stroke="#CC2200" stroke-width="2.5"/>
      <path d="M-18,-16 A26,26 0 0,1 18,-16" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
      <path d="M18,-16 A26,26 0 0,1 22,12" fill="none" stroke="#4CAF50" stroke-width="2.5"/>

      <!-- Needle (good oil pressure) -->
      <line x1="0" y1="4" x2="14" y2="-16" stroke="#FF6B00" stroke-width="2" filter="url(#orangeGlow)"/>
      <circle cx="0" cy="0" r="3" fill="#333333" stroke="#FF6B00" stroke-width="1"/>

      <!-- Label -->
      <text x="0" y="14" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="8" font-weight="bold" fill="#F0F0F0">42</text>
      <text x="0" y="20" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="5" fill="#AAAAAA">OIL PSI</text>
    </g>

    <!-- === Bottom data strip === -->
    <g transform="translate(8, 258)">
      <rect x="0" y="0" width="144" height="44" rx="3" fill="#111111" stroke="#333333" stroke-width="0.5"/>

      <!-- Data rows -->
      <text x="6" y="12" font-family="'Share Tech Mono', monospace" font-size="7" fill="#4A7FA5">SPEED</text>
      <text x="90" y="12" font-family="'Share Tech Mono', monospace" font-size="7" fill="#FF6B00" text-anchor="end">62 MPH</text>
      <line x1="4" y1="16" x2="140" y2="16" stroke="#333333" stroke-width="0.5"/>

      <text x="6" y="26" font-family="'Share Tech Mono', monospace" font-size="7" fill="#4A7FA5">MAF</text>
      <text x="90" y="26" font-family="'Share Tech Mono', monospace" font-size="7" fill="#F0F0F0" text-anchor="end">14.2 g/s</text>
      <line x1="4" y1="30" x2="140" y2="30" stroke="#333333" stroke-width="0.5"/>

      <text x="6" y="40" font-family="'Share Tech Mono', monospace" font-size="7" fill="#4A7FA5">FUEL TRIM</text>
      <text x="90" y="40" font-family="'Share Tech Mono', monospace" font-size="7" fill="#4CAF50" text-anchor="end">+2.3%</text>

      <!-- Connected indicator -->
      <g transform="translate(100, 4)">
        <circle cx="0" cy="4" r="3" fill="#4CAF50" opacity="0.3"/>
        <circle cx="0" cy="4" r="1.5" fill="#4CAF50"/>
        <text x="6" y="7" font-family="'Share Tech Mono', monospace" font-size="5" fill="#4CAF50">ECU OK</text>
      </g>
    </g>

    <!-- Home bar indicator -->
    <rect x="56" y="312" width="48" height="3" rx="1.5" fill="#444444"/>
  </g>

  <!-- Blueprint annotation labels -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#4A7FA5">
    <!-- Arrow to OBD port -->
    <text x="60" y="290">16-PIN DLC</text>
    <line x1="95" y1="291" x2="110" y2="298" stroke="#4A7FA5" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Arrow to phone -->
    <text x="320" y="50">DIAGNOSTIC DISPLAY</text>
    <line x1="380" y1="52" x2="360" y2="60" stroke="#4A7FA5" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Arrow to cable -->
    <text x="160" y="260">DATA LINK</text>
    <line x1="190" y1="262" x2="215" y2="270" stroke="#4A7FA5" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>

  <!-- Corner brackets (blueprint frame) -->
  <g stroke="#4A7FA5" stroke-width="1" fill="none">
    <path d="M10,30 L10,10 L30,10"/>
    <path d="M470,30 L470,10 L450,10"/>
    <path d="M10,470 L10,490 L30,490"/>
    <path d="M470,470 L470,490 L450,490"/>
  </g>

  <!-- Title block (bottom-right, blueprint style) -->
  <g transform="translate(340, 480)">
    <rect x="0" y="0" width="150" height="16" fill="none" stroke="#4A7FA5" stroke-width="0.5"/>
    <text x="4" y="11" font-family="'Share Tech Mono', monospace" font-size="6" fill="#4A7FA5">ODB+ SYSTEM DIAGRAM REV.A</text>
  </g>
</svg>