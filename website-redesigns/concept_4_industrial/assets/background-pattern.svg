<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <pattern id="checkerplate" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Base plate color -->
      <rect width="40" height="40" fill="#1C1C1C"/>
      <!-- Diamond plate raised pattern (checker plate / tread plate) -->
      <!-- Row 1 -->
      <path d="M10,2 L14,6 L10,10 L6,6 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M9.5,2.5 L13,5.5 L10,9 L7,5.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 2 offset -->
      <path d="M30,2 L34,6 L30,10 L26,6 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M29.5,2.5 L33,5.5 L30,9 L27,5.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 3 -->
      <path d="M20,12 L24,16 L20,20 L16,16 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M19.5,12.5 L23,15.5 L20,19 L17,15.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 4 -->
      <path d="M0,12 L4,16 L0,20 L-4,16 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M40,12 L44,16 L40,20 L36,16 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <!-- Row 5 -->
      <path d="M10,22 L14,26 L10,30 L6,26 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M9.5,22.5 L13,25.5 L10,29 L7,25.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 6 -->
      <path d="M30,22 L34,26 L30,30 L26,26 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M29.5,22.5 L33,25.5 L30,29 L27,25.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 7 -->
      <path d="M20,32 L24,36 L20,40 L16,36 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M19.5,32.5 L23,35.5 L20,39 L17,35.5 Z" fill="none" stroke="#2A2A2A" stroke-width="0.2"/>
      <!-- Row 8 -->
      <path d="M0,32 L4,36 L0,40 L-4,36 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <path d="M40,32 L44,36 L40,40 L36,36 Z" fill="#222222" stroke="#262626" stroke-width="0.3"/>
      <!-- Subtle grain/noise overlay -->
      <rect width="40" height="40" fill="#1E1E1E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="40" height="40" fill="url(#checkerplate)"/>
</svg>